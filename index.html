<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Editor - Paper.js</title>
  </head>
  <body class="h-screen flex flex-col bg-gray-100 text-gray-900 overflow-hidden">
    <!-- Header / Navbar -->
    <header class="bg-gray-800 text-white p-4 flex justify-between items-center shadow-md">
      <h1 class="text-xl font-bold">SVG Editor</h1>
      <div class="flex gap-4">
        <label class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded cursor-pointer transition text-sm">
          Import SVG
          <input type="file" id="import-file" class="hidden" accept=".svg" />
        </label>
        <button id="import-code" class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded transition text-sm">
          Import from Code
        </button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Sidebar / Tools -->
      <aside class="w-64 bg-white border-r p-4 flex flex-col gap-6 shadow-sm overflow-y-auto">
        <section>
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Alignment</h2>
          <div class="grid grid-cols-3 gap-2">
            <button id="align-left" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200" title="Align Left" disabled>Left</button>
            <button id="align-h-center" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200" title="Horizontal Center" disabled>H-Center</button>
            <button id="align-right" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200" title="Align Right" disabled>Right</button>
            
            <button id="align-top" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200" title="Align Top" disabled>Top</button>
            <button id="align-v-center" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200" title="Vertical Center" disabled>V-Center</button>
            <button id="align-bottom" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200" title="Align Bottom" disabled>Bottom</button>
          </div>
        </section>

        <section>
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Transform</h2>
          <div class="grid grid-cols-2 gap-2">
            <button id="flip-h" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded text-xs font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200" disabled>Flip H</button>
            <button id="flip-v" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded text-xs font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200" disabled>Flip V</button>
          </div>
        </section>

        <section class="mt-auto border-t pt-6">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Export</h2>
          <div class="flex flex-col gap-2">
            <button id="export-file" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded transition text-sm">
              Save Canvas to .svg
            </button>
            <button id="copy-code" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded transition text-sm">
              Copy Canvas to Code
            </button>
            <button id="clear-canvas" class="text-xs text-red-500 hover:text-red-700 underline mt-2 transition text-center w-full">
              Clear Canvas
            </button>
          </div>
        </section>
      </aside>

      <!-- Main Canvas Area -->
      <main id="canvas-container" class="relative flex-1 bg-gray-200 p-8 overflow-hidden">
        <canvas id="editor-canvas" class="bg-white shadow-lg mx-auto block"></canvas>
      </main>
    </div>

    <!-- Modal for Code Import (Hidden by default) -->
    <div id="code-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl p-6">
        <h3 class="text-lg font-bold mb-4">Paste SVG Code</h3>
        <textarea id="svg-code-input" class="w-full h-64 p-3 border rounded font-mono text-sm mb-4" placeholder="<svg ...>...</svg>"></textarea>
        <div class="flex justify-end gap-3">
          <button id="close-modal" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition">Cancel</button>
          <button id="confirm-code" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Import</button>
        </div>
      </div>
    </div>

    <!-- Modal for Clear Confirmation (Hidden by default) -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-[70]">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
        <h3 class="text-lg font-bold mb-2 text-red-600">Clear Canvas</h3>
        <p class="text-gray-600 mb-6">Are you sure you want to clear the canvas? All unsaved work will be lost.</p>
        <div class="flex justify-end gap-3">
          <button id="cancel-clear" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition">Cancel</button>
          <button id="confirm-clear" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">Clear Everything</button>
        </div>
      </div>
    </div>

    <!-- Modal for Filename Input (Hidden by default) -->
    <div id="filename-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-[80]">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
        <h3 class="text-lg font-bold mb-4">Save SVG</h3>
        <div class="mb-4">
          <label for="filename-input" class="block text-sm font-medium text-gray-700 mb-1">Filename</label>
          <div class="flex items-center border rounded overflow-hidden">
            <input type="text" id="filename-input" class="flex-1 p-2 outline-none text-sm" placeholder="my-design" value="my-design">
            <span class="bg-gray-100 px-3 py-2 text-gray-500 text-sm">.svg</span>
          </div>
        </div>
        <div class="flex justify-end gap-3">
          <button id="close-filename-modal" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition">Cancel</button>
          <button id="confirm-filename" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">Save</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <!-- Context Menu -->
    <div id="context-menu" class="fixed hidden bg-white border border-gray-200 shadow-lg rounded-md py-1 z-[60] min-w-[200px]">
      <button id="ctx-copy" class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100">
        <span>Copy Selection to Code</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Ctrl+C</span>
      </button>
      <button id="ctx-download" class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100">
        <span>Download .svg</span>
      </button>
      <button id="ctx-duplicate" class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100">
        <span>Duplicate</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Alt+Drag</span>
      </button>
      <button id="ctx-front" class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100">
        <span>Bring to Front</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">]</span>
      </button>
      <button id="ctx-back" class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100">
        <span>Send to Back</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">[</span>
      </button>
      <button id="ctx-group" class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100">
        <span>Group</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Ctrl+G</span>
      </button>
      <button id="ctx-ungroup" class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100">
        <span>Ungroup</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Ctrl+BS</span>
      </button>
      <button id="ctx-delete" class="w-full flex justify-between items-center px-4 py-2 text-sm text-red-600 hover:bg-gray-100 transition">
        <span>Delete</span>
        <span class="text-xs text-red-300 ml-4 font-mono">Del</span>
      </button>
    </div>
  </body>
</html>
</html>
