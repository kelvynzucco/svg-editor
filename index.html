<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal SVG editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-screen flex flex-col bg-gray-100 text-gray-900 font-sans">
    <header
      class="bg-white border-b border-black/10 px-6 py-3 flex items-center justify-between z-10"
    >
      <div class="flex items-center gap-3">
        <div class="bg-blue-600 p-2 rounded-lg text-white">
          <!-- <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
            />
          </svg> -->
        </div>
        <h1 class="font-black text-lg tracking-tight">Minimal SVG</h1>
      </div>
      <div class="flex items-center gap-2">
        <div class="relative">
          <button
            id="import-btn"
            class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded transition text-sm font-medium flex items-center gap-2 focus:outline-none"
          >
            <span>Import</span>
            <span data-icon="chevron-down"></span>
          </button>
          <div
            id="import-menu"
            class="absolute top-full right-0 mt-2 w-48 bg-white border border-black/10 rounded-lg shadow-xl hidden overflow-hidden z-30"
          >
            <button
              id="open-project-btn"
              class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition border-b border-gray-100 flex items-center gap-2 focus:outline-none"
            >
              <span data-icon="folder-open"></span>
              <span>Open Project</span>
            </button>
            <button
              id="import-file-btn"
              class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition border-b border-gray-100 flex items-center gap-2 focus:outline-none"
            >
              <span data-icon="file-up"></span>
              <span>Import SVG</span>
            </button>
            <button
              id="import-code-btn"
              class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition flex items-center gap-2 focus:outline-none"
            >
              <span data-icon="code-2"></span>
              <span>Import Code</span>
            </button>
          </div>
        </div>
        
        <button
          id="toggle-lock"
          class="bg-orange-50 hover:bg-orange-100 text-gray-700 p-2 rounded transition border border-black/5"
          title="Toggle Browser Shortcuts Lock"
        >
          <div id="lock-icon-unlocked" class="hidden">
            <span data-icon="unlock"></span>
          </div>
          <div id="lock-icon-locked" class="text-orange-600">
            <span data-icon="lock"></span>
          </div>
        </button>
        <input type="file" id="import-file" class="hidden" accept=".svg" />
        <input type="file" id="open-project-input" class="hidden" accept=".json" />
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Left Toolbar -->
      <aside
        class="w-16 bg-white border-r border-black/10 flex flex-col items-center py-4 gap-4 z-20"
      >
        <button
          id="tool-selection"
          class="p-3 rounded-lg transition-colors bg-blue-50 text-blue-600 shadow-sm focus:outline-none"
          title="Selection Tool (V)"
        >
          <span data-icon="mouse-pointer-2"></span>
        </button>
        <button
          id="tool-direct-selection"
          class="p-3 rounded-lg transition-colors text-gray-400 hover:bg-gray-100 focus:outline-none"
          title="Direct Selection Tool (A)"
        >
          <span data-icon="mouse-pointer"></span>
        </button>
        <button
          id="tool-shape"
          class="p-3 rounded-lg transition-colors text-gray-400 hover:bg-gray-100 focus:outline-none"
          title="Shape Tool (R)"
        >
          <span id="shape-tool-icon" data-icon="square"></span>
        </button>
        <button
          id="tool-eyedropper"
          class="p-3 rounded-lg transition-colors text-gray-400 hover:bg-gray-100 focus:outline-none"
          title="Eyedropper Tool (I)"
        >
          <span data-icon="pipette"></span>
        </button>
      </aside>

      <!-- Main Canvas Area -->
      <main
        id="canvas-container"
        class="relative flex-1 bg-gray-200 p-8 overflow-hidden"
      >
        <!-- Navigation Info/Controls -->
        <div class="absolute top-4 right-4 z-10 flex gap-2">
          <button
            id="reset-view"
            class="bg-white/90 hover:bg-white text-gray-700 px-3 py-1.5 rounded-lg shadow-sm border border-black/5 text-xs font-medium transition focus:outline-none flex items-center gap-1.5"
            title="Reset View (Zoom 100%)"
          >
            <span data-icon="maximize"></span>
            Reset View
          </button>
        </div>

        <canvas id="editor-canvas" class="bg-gray-100 mx-auto block"></canvas>
      </main>

      <!-- Sidebar / Tools -->
      <aside
        class="w-64 bg-white border-l border-black/10 p-6 flex flex-col gap-8 overflow-y-auto scrollbar-hide"
      >
          <section>
          <h2
            class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3"
          >
            Alignment
          </h2>
          <div class="flex items-center gap-1">
            <!-- Horizontal Alignment Group -->
            <div class="flex gap-1">
              <button
                id="align-left"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded transition disabled:opacity-30 disabled:cursor-not-allowed border border-gray-200 focus:outline-none flex items-center justify-center"
                title="Align Left"
                disabled
              >
                <span data-icon="align-left"></span>
              </button>
              <button
                id="align-h-center"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded transition disabled:opacity-30 disabled:cursor-not-allowed border border-gray-200 focus:outline-none flex items-center justify-center"
                title="Horizontal Center"
                disabled
              >
                <span data-icon="align-h-center"></span>
              </button>
              <button
                id="align-right"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded transition disabled:opacity-30 disabled:cursor-not-allowed border border-gray-200 focus:outline-none flex items-center justify-center"
                title="Align Right"
                disabled
              >
                <span data-icon="align-right"></span>
              </button>
            </div>

            <!-- Separator -->
            <div class="w-2"></div>

            <!-- Vertical Alignment Group -->
            <div class="flex gap-1">
              <button
                id="align-top"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded transition disabled:opacity-30 disabled:cursor-not-allowed border border-gray-200 focus:outline-none flex items-center justify-center"
                title="Align Top"
                disabled
              >
                <span data-icon="align-top"></span>
              </button>
              <button
                id="align-v-center"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded transition disabled:opacity-30 disabled:cursor-not-allowed border border-gray-200 focus:outline-none flex items-center justify-center"
                title="Vertical Center"
                disabled
              >
                <span data-icon="align-v-center"></span>
              </button>
              <button
                id="align-bottom"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded transition disabled:opacity-30 disabled:cursor-not-allowed border border-gray-200 focus:outline-none flex items-center justify-center"
                title="Align Bottom"
                disabled
              >
                <span data-icon="align-bottom"></span>
              </button>
            </div>
          </div>
        </section>

        <section class="border-t pt-4 border-black/10">
          <h2
            class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3"
          >
            Style
          </h2>

          <!-- Fill Controls -->
          <div class="mb-4">
            <div class="flex items-center justify-between mb-1">
              <label class="block text-[10px] text-gray-400 uppercase"
                >Fill</label
              >
              <button
                id="remove-fill"
                class="text-gray-300 hover:text-red-500 transition-colors p-0.5 focus:outline-none"
                title="Remove Fill"
              >
                <span data-icon="minus"></span>
              </button>
            </div>
            <div class="flex items-center gap-2 mb-2">
              <div
                id="fill-picker-swatch"
                class="w-8 h-8 rounded cursor-pointer relative"
                style="background-color: #000000"
              ></div>
              <input
                type="text"
                id="fill-hex-input"
                class="flex-1 bg-gray-50 border border-gray-100 rounded px-2 py-1.5 text-[10px] font-mono outline-none focus:border-blue-300 focus:outline-none transition"
                placeholder="#000000"
                value="#000000"
              />
            </div>
            <div class="flex items-center gap-2">
              <div class="flex-1">
                <input
                  type="range"
                  id="fill-opacity"
                  class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer focus:outline-none"
                  min="0"
                  max="100"
                  value="100"
                />
              </div>
              <span
                id="fill-opacity-val"
                class="text-[9px] text-gray-500 w-8 text-right font-medium"
                >100%</span
              >
            </div>
          </div>

          <!-- Stroke Controls -->
          <div class="mb-4">
            <div class="flex items-center justify-between mb-1">
              <label class="block text-[10px] text-gray-400 uppercase"
                >Stroke</label
              >
              <button
                id="remove-stroke"
                class="text-gray-300 hover:text-red-500 transition-colors p-0.5 focus:outline-none"
                title="Remove Stroke"
              >
                <span data-icon="minus"></span>
              </button>
            </div>
            <div class="flex items-center gap-2 mb-2">
              <div
                id="stroke-picker-swatch"
                class="w-8 h-8 rounded cursor-pointer relative"
                style="background-color: #000000"
              ></div>
              <input
                type="text"
                id="stroke-hex-input"
                class="flex-1 bg-gray-50 border border-gray-100 rounded px-2 py-1.5 text-[10px] font-mono outline-none focus:border-blue-300 focus:outline-none transition"
                placeholder="#000000"
                value="#000000"
              />
            </div>
            <div class="flex items-center gap-2 mb-3">
              <div class="flex-1">
                <input
                  type="range"
                  id="stroke-opacity"
                  class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer focus:outline-none"
                  min="0"
                  max="100"
                  value="100"
                />
              </div>
              <span
                id="stroke-opacity-val"
                class="text-[9px] text-gray-500 w-8 text-right font-medium"
                >100%</span
              >
            </div>

            <div
              class="flex items-center justify-between bg-gray-50 p-2 rounded border border-gray-100"
            >
              <label class="text-[10px] text-gray-500 font-medium"
                >Stroke Weight</label
              >
              <input
                type="number"
                id="stroke-width"
                class="w-12 bg-transparent text-right outline-none text-xs font-mono focus:outline-none"
                min="0"
                step="0.5"
                value="1"
              />
            </div>
          </div>
        </section>

        <section class="mt-auto border-t pt-6 border-black/10">
          <div class="flex flex-col gap-2 relative">
            <div
              id="export-menu"
              class="absolute bottom-full left-0 right-0 mb-2 bg-white border border-black/10 rounded-lg shadow-xl hidden overflow-hidden z-30"
            >
              <button
                id="save-project-btn"
                class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition border-b border-gray-100 flex items-center gap-2 focus:outline-none"
              >
                <span data-icon="save"></span>
                <span>Save Project</span>
              </button>
              <button
                id="export-file"
                class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition border-b border-gray-100 flex items-center gap-2 focus:outline-none"
              >
                <span data-icon="file-down"></span>
                <span>Save as .svg</span>
              </button>
              <button
                id="copy-code"
                class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition flex items-center gap-2 focus:outline-none"
              >
                <span data-icon="code"></span>
                <span>Copy as Code</span>
              </button>
            </div>
            <button
              id="export-btn"
              class="bg-blue-600 hover:bg-blue-700 text-white px-2 py-2.5 rounded transition text-sm font-medium focus:outline-none flex items-center justify-center gap-2"
            >
              <span>Export Artboard</span>
              <span data-icon="chevron-up"></span>
            </button>
            <button
              id="clear-canvas"
              class="flex items-center justify-center gap-1.5 text-xs text-red-500 hover:text-red-700 underline mt-2 transition text-center w-full focus:outline-none"
            >
              <span data-icon="trash-2"></span>
              <span>Clear Canvas</span>
            </button>
          </div>
        </section>
      </aside>
    </div>

    <!-- Modal for Code Import (Hidden by default) -->
    <div
      id="code-modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50"
    >
      <div class="bg-white rounded-lg w-full max-w-2xl p-6">
        <h3 class="text-lg font-bold mb-4">Paste SVG Code</h3>
        <textarea
          id="svg-code-input"
          class="w-full h-64 p-3 border rounded font-mono text-sm mb-4"
          placeholder="<svg>...</svg>"
        ></textarea>
        <div class="flex justify-end gap-3">
          <button
            id="close-modal"
            class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition"
          >
            Cancel
          </button>
          <button
            id="confirm-code"
            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition"
          >
            Import
          </button>
        </div>
      </div>
    </div>

    <!-- Modal for Clear Confirmation (Hidden by default) -->
    <div
      id="confirm-modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-70"
    >
      <div class="bg-white rounded-lg w-full max-w-md p-6">
        <h3 class="text-lg font-bold mb-2 text-red-600">Clear Canvas</h3>
        <p class="text-gray-600 mb-6">
          Are you sure you want to clear the canvas? All unsaved work will be
          lost.
        </p>
        <div class="flex justify-end gap-3">
          <button
            id="cancel-clear"
            class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition"
          >
            Cancel
          </button>
          <button
            id="confirm-clear"
            class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition"
          >
            Clear Everything
          </button>
        </div>
      </div>
    </div>

    <!-- Modal for Filename Input (Hidden by default) -->
    <div
      id="filename-modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-80"
    >
      <div class="bg-white rounded-lg w-full max-w-md p-6">
        <h3 id="filename-modal-title" class="text-lg font-bold mb-4">Save SVG</h3>
        <div class="mb-4">
          <label
            for="filename-input"
            class="block text-sm font-medium text-gray-700 mb-1"
            >Filename</label
          >
          <div class="flex items-center border rounded overflow-hidden">
            <input
              type="text"
              id="filename-input"
              class="flex-1 p-2 outline-none text-sm"
              placeholder="my-design"
              value="my-design"
            />
            <span id="filename-extension" class="bg-gray-100 px-3 py-2 text-gray-500 text-sm"
              >.svg</span
            >
          </div>
        </div>
        <div class="flex justify-end gap-3">
          <button
            id="close-filename-modal"
            class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition"
          >
            Cancel
          </button>
          <button
            id="confirm-filename"
            class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition"
          >
            Save
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <!-- Item Context Menu -->
    <div
      id="context-menu"
      class="fixed hidden overflow-hidden bg-white border border-gray-200 shadow-xl shadow-black/4 rounded-xl z-60 min-w-50"
    >
      <button
        id="ctx-copy"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Copy Selection to Code</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Ctrl+C</span>
      </button>
      <button
        id="ctx-download"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Save to .svg</span>
      </button>
      <button
        id="ctx-duplicate"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Duplicate</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Alt+Drag</span>
      </button>
      <button
        id="ctx-flip-h"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Flip Horizontal</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Shift+H</span>
      </button>
      <button
        id="ctx-flip-v"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Flip Vertical</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Shift+V</span>
      </button>
      <button
        id="ctx-front"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Bring to Front</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">]</span>
      </button>
      <button
        id="ctx-back"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Send to Back</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">[</span>
      </button>
      <button
        id="ctx-group"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Group</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Ctrl+G</span>
      </button>
      <button
        id="ctx-ungroup"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Ungroup</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Ctrl+BS</span>
      </button>
      <button
        id="ctx-delete"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-red-600 hover:bg-gray-100 transition"
      >
        <span>Delete</span>
        <span class="text-xs text-red-300 ml-4 font-mono">Del</span>
      </button>
    </div>

    <!-- Canvas Context Menu -->
    <div
      id="canvas-context-menu"
      class="fixed hidden overflow-hidden bg-white border border-gray-200 shadow-xl shadow-black/4 rounded-xl z-60 min-w-40"
    >
      <button
        id="ctx-set-artboard"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Set Artboard Size</span>
      </button>
      <button
        id="ctx-clear-canvas"
        class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-gray-100 transition"
      >
        <span data-icon="trash-2"></span>
        <span>Clear Canvas</span>
      </button>
    </div>

    <!-- Modal for Artboard Size -->
    <div
      id="artboard-modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-80"
    >
      <div class="bg-white rounded-lg w-full max-w-sm p-6">
        <h3 class="text-lg font-bold mb-4">Set Artboard Size</h3>
        <div class="flex gap-4 mb-6">
          <div class="flex-1">
            <label class="block text-xs font-medium text-gray-500 mb-1"
              >Width (px)</label
            >
            <input
              type="number"
              id="artboard-width"
              class="w-full border rounded p-2 text-sm outline-none focus:border-blue-500"
              value="800"
              min="10"
              max="4096"
            />
          </div>
          <div class="flex-1">
            <label class="block text-xs font-medium text-gray-500 mb-1"
              >Height (px)</label
            >
            <input
              type="number"
              id="artboard-height"
              class="w-full border rounded p-2 text-sm outline-none focus:border-blue-500"
              value="600"
              min="10"
              max="4096"
            />
          </div>
        </div>
        <div class="flex justify-end gap-3">
          <button
            id="close-artboard-modal"
            class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition"
          >
            Cancel
          </button>
          <button
            id="confirm-artboard-size"
            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition"
          >
            Apply Size
          </button>
        </div>
      </div>
    </div>

    <!-- Floating Picker Container -->
    <div id="picker-container" class="fixed hidden z-9999"></div>

    <!-- Shape Submenu -->
    <div
      id="shape-submenu"
      class="hidden fixed bg-white border border-black/10 rounded-xl shadow-xl p-2 flex flex-col gap-1 z-30"
    >
      <button
        id="shape-rect"
        class="p-2.5 rounded-lg transition-colors bg-blue-50 text-blue-600 focus:outline-none"
        title="Rectangle"
      >
        <span data-icon="square"></span>
      </button>
      <button
        id="shape-ellipse"
        class="p-2.5 rounded-lg transition-colors text-gray-400 hover:bg-gray-100 focus:outline-none"
        title="Ellipse"
      >
        <span data-icon="circle"></span>
      </button>
      <button
        id="shape-poly"
        class="p-2.5 rounded-lg transition-colors text-gray-400 hover:bg-gray-100 focus:outline-none"
        title="Polygon"
      >
        <span data-icon="hexagon"></span>
      </button>
    </div>
  </body>
</html>
