<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traço - Minimal SVG editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-screen flex flex-col bg-gray-100 text-gray-900 font-sans">
    <header
      class="bg-white border-b border-black/10 px-6 py-3 flex items-center justify-between z-10"
    >
      <div class="flex items-center gap-3">
        <div class="bg-blue-600 p-2 rounded-lg text-white">
          <!-- <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
            />
          </svg> -->
        </div>
        <h1 class="font-black text-lg tracking-tight">
          TRAÇO <span class="font-medium">- Minimal SVG Editor</span>
        </h1>
      </div>
      <div class="flex items-center gap-2">
        <button
          id="import-file-btn"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded transition text-sm font-medium"
        >
          Import File
        </button>
        <button
          id="import-code-btn"
          class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition text-sm font-medium"
        >
          Import &lt;code/&gt;
        </button>
        <input type="file" id="import-file" class="hidden" accept=".svg" />
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Left Toolbar -->
      <aside
        class="w-16 bg-white border-r border-black/10 flex flex-col items-center py-4 gap-4 z-20"
      >
        <button
          id="tool-selection"
          class="p-3 rounded-lg transition-colors bg-blue-50 text-blue-600 shadow-sm"
          title="Selection Tool (V)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-mouse-pointer-2"
          >
            <path
              d="M4.037 4.437 19.92 10.12a.59.59 0 0 1 .09 1.034l-4.833 3.488a.756.756 0 0 0-.258.391l-3.231 7.907a.59.59 0 0 1-1.095.034L4.044 5.473a.589.589 0 0 1 .71-.755Z"
            />
            <path d="m13 13 4 4" />
          </svg>
        </button>
        <button
          id="tool-eyedropper"
          class="p-3 rounded-lg transition-colors text-gray-400 hover:bg-gray-100"
          title="Eyedropper Tool (I)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-pipette"
          >
            <path d="m2 22 1-1h3l9-9" />
            <path d="M3 21v-3l9-9" />
            <path
              d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"
            />
          </svg>
        </button>
      </aside>

      <!-- Main Canvas Area -->
      <main
        id="canvas-container"
        class="relative flex-1 bg-gray-200 p-8 overflow-hidden"
      >
        <canvas id="editor-canvas" class="bg-white mx-auto block"></canvas>
      </main>

      <!-- Sidebar / Tools -->
      <aside
        class="w-64 bg-white border-l border-black/10 p-6 flex flex-col gap-8 overflow-y-auto scrollbar-hide"
      >
        <section>
          <h2
            class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3"
          >
            Alignment
          </h2>
          <div class="grid grid-cols-3 gap-2">
            <button
              id="align-left"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200"
              title="Align Left"
              disabled
            >
              Left
            </button>
            <button
              id="align-h-center"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200"
              title="Horizontal Center"
              disabled
            >
              H-Center
            </button>
            <button
              id="align-right"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200"
              title="Align Right"
              disabled
            >
              Right
            </button>

            <button
              id="align-top"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200"
              title="Align Top"
              disabled
            >
              Top
            </button>
            <button
              id="align-v-center"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200"
              title="Vertical Center"
              disabled
            >
              V-Center
            </button>
            <button
              id="align-bottom"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-1 py-2 rounded text-[10px] font-medium transition disabled:opacity-50 disabled:cursor-not-allowed border border-gray-200"
              title="Align Bottom"
              disabled
            >
              Bottom
            </button>
          </div>
        </section>

        <section class="border-t pt-4 border-black/10">
          <h2
            class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3"
          >
            Style
          </h2>

          <!-- Fill Controls -->
          <div class="mb-4">
            <label class="block text-[10px] text-gray-400 uppercase mb-1"
              >Fill</label
            >
            <div class="flex items-center gap-2 mb-2">
              <div
                id="fill-picker-swatch"
                class="w-8 h-8 rounded cursor-pointer relative"
                style="background-color: #000000"
              ></div>
              <input
                type="text"
                id="fill-hex-input"
                class="flex-1 bg-gray-50 border border-gray-100 rounded px-2 py-1.5 text-[10px] font-mono outline-none focus:border-blue-300 transition"
                placeholder="#000000"
                value="#000000"
              />
            </div>
            <div class="flex items-center gap-2">
              <div class="flex-1">
                <input
                  type="range"
                  id="fill-opacity"
                  class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                  min="0"
                  max="100"
                  value="100"
                />
              </div>
              <span
                id="fill-opacity-val"
                class="text-[9px] text-gray-500 w-8 text-right font-medium"
                >100%</span
              >
            </div>
          </div>

          <!-- Stroke Controls -->
          <div class="mb-4">
            <label class="block text-[10px] text-gray-400 uppercase mb-1"
              >Stroke</label
            >
            <div class="flex items-center gap-2 mb-2">
              <div
                id="stroke-picker-swatch"
                class="w-8 h-8 rounded cursor-pointer relative"
                style="background-color: #000000"
              ></div>
              <input
                type="text"
                id="stroke-hex-input"
                class="flex-1 bg-gray-50 border border-gray-100 rounded px-2 py-1.5 text-[10px] font-mono outline-none focus:border-blue-300 transition"
                placeholder="#000000"
                value="#000000"
              />
            </div>
            <div class="flex items-center gap-2 mb-3">
              <div class="flex-1">
                <input
                  type="range"
                  id="stroke-opacity"
                  class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                  min="0"
                  max="100"
                  value="100"
                />
              </div>
              <span
                id="stroke-opacity-val"
                class="text-[9px] text-gray-500 w-8 text-right font-medium"
                >100%</span
              >
            </div>

            <div
              class="flex items-center justify-between bg-gray-50 p-2 rounded border border-gray-100"
            >
              <label class="text-[10px] text-gray-500 font-medium"
                >Stroke Weight</label
              >
              <input
                type="number"
                id="stroke-width"
                class="w-12 bg-transparent text-right outline-none text-xs font-mono"
                min="0"
                step="0.5"
                value="1"
              />
            </div>
          </div>
        </section>

        <section class="mt-auto border-t pt-6 border-black/10">
          <h2
            class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3"
          >
            Export
          </h2>
          <div class="flex flex-col gap-2">
            <button
              id="export-file"
              class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded transition text-sm"
            >
              Save Canvas to .svg
            </button>
            <button
              id="copy-code"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded transition text-sm"
            >
              Copy Canvas to &lt;code/&gt;
            </button>
            <button
              id="clear-canvas"
              class="text-xs text-red-500 hover:text-red-700 underline mt-2 transition text-center w-full"
            >
              Clear Canvas
            </button>
          </div>
        </section>
      </aside>
    </div>

    <!-- Modal for Code Import (Hidden by default) -->
    <div
      id="code-modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50"
    >
      <div class="bg-white rounded-lg w-full max-w-2xl p-6">
        <h3 class="text-lg font-bold mb-4">Paste SVG Code</h3>
        <textarea
          id="svg-code-input"
          class="w-full h-64 p-3 border rounded font-mono text-sm mb-4"
          placeholder="<svg>...</svg>"
        ></textarea>
        <div class="flex justify-end gap-3">
          <button
            id="close-modal"
            class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition"
          >
            Cancel
          </button>
          <button
            id="confirm-code"
            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition"
          >
            Import
          </button>
        </div>
      </div>
    </div>

    <!-- Modal for Clear Confirmation (Hidden by default) -->
    <div
      id="confirm-modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-70"
    >
      <div class="bg-white rounded-lg w-full max-w-md p-6">
        <h3 class="text-lg font-bold mb-2 text-red-600">Clear Canvas</h3>
        <p class="text-gray-600 mb-6">
          Are you sure you want to clear the canvas? All unsaved work will be
          lost.
        </p>
        <div class="flex justify-end gap-3">
          <button
            id="cancel-clear"
            class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition"
          >
            Cancel
          </button>
          <button
            id="confirm-clear"
            class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition"
          >
            Clear Everything
          </button>
        </div>
      </div>
    </div>

    <!-- Modal for Filename Input (Hidden by default) -->
    <div
      id="filename-modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-80"
    >
      <div class="bg-white rounded-lg w-full max-w-md p-6">
        <h3 class="text-lg font-bold mb-4">Save SVG</h3>
        <div class="mb-4">
          <label
            for="filename-input"
            class="block text-sm font-medium text-gray-700 mb-1"
            >Filename</label
          >
          <div class="flex items-center border rounded overflow-hidden">
            <input
              type="text"
              id="filename-input"
              class="flex-1 p-2 outline-none text-sm"
              placeholder="my-design"
              value="my-design"
            />
            <span class="bg-gray-100 px-3 py-2 text-gray-500 text-sm"
              >.svg</span
            >
          </div>
        </div>
        <div class="flex justify-end gap-3">
          <button
            id="close-filename-modal"
            class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition"
          >
            Cancel
          </button>
          <button
            id="confirm-filename"
            class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition"
          >
            Save
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <!-- Context Menu -->
    <div
      id="context-menu"
      class="fixed hidden overflow-hidden bg-white border border-gray-200 shadow-xl shadow-black/4 rounded-xl z-60 min-w-50"
    >
      <button
        id="ctx-copy"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Copy Selection to Code</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Ctrl+C</span>
      </button>
      <button
        id="ctx-download"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Save to .svg</span>
      </button>
      <button
        id="ctx-duplicate"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Duplicate</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Alt+Drag</span>
      </button>
      <button
        id="ctx-flip-h"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Flip Horizontal</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Shift+H</span>
      </button>
      <button
        id="ctx-flip-v"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Flip Vertical</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Shift+V</span>
      </button>
      <button
        id="ctx-front"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Bring to Front</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">]</span>
      </button>
      <button
        id="ctx-back"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Send to Back</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">[</span>
      </button>
      <button
        id="ctx-group"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Group</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Ctrl+G</span>
      </button>
      <button
        id="ctx-ungroup"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition border-b border-gray-100"
      >
        <span>Ungroup</span>
        <span class="text-xs text-gray-400 ml-4 font-mono">Ctrl+BS</span>
      </button>
      <button
        id="ctx-delete"
        class="w-full flex justify-between items-center px-4 py-2 text-sm text-red-600 hover:bg-gray-100 transition"
      >
        <span>Delete</span>
        <span class="text-xs text-red-300 ml-4 font-mono">Del</span>
      </button>
    </div>

    <!-- Floating Picker Container -->
    <div id="picker-container" class="fixed hidden z-9999"></div>
  </body>
</html>
